<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#17231c">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="沼継ぎの一族">
<title>沼継ぎの一族 試作版 v0.2</title>
<style>
:root{
  --bg:#101712;--panel:#1d2a20;--line:#708165;--text:#f4ecd3;
  --muted:#b8c0a7;--gold:#e7c75c;--danger:#d35f52;--shadow:#090d0a;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:"Courier New",monospace}
body{padding:8px;image-rendering:pixelated}
#app{max-width:1180px;margin:auto}
.panel{
  background:var(--panel);border:4px solid var(--line);padding:10px;margin:8px 0;
  box-shadow:4px 4px 0 var(--shadow),inset -3px -3px 0 #111a14,inset 3px 3px 0 #344936
}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px}
.title{font-size:clamp(18px,3vw,30px);font-weight:900}
.sub{font-size:12px;color:var(--muted)}
button{font:inherit}
.btn{border:3px solid #9aa886;background:#394e3d;color:var(--text);padding:8px 12px;box-shadow:3px 3px 0 var(--shadow);cursor:pointer}
.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--shadow)}
.btn.primary{background:#6e6331;border-color:#d5bf61}
.btn.danger{background:#693b36;border-color:#c16d62}
.btn:disabled{opacity:.4;cursor:not-allowed}
.map{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;align-items:center;font-size:12px}
.node{padding:5px 8px;border:2px solid #53634f;background:#172018}
.node.current{border-color:var(--gold);color:var(--gold)}
.node.done{opacity:.5}
.battle-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:8px}
.enemy{text-align:center}
.enemy-name{font-size:22px;font-weight:900}
.sprite-wrap{height:145px;display:flex;align-items:center;justify-content:center}
canvas{image-rendering:pixelated}
#enemySprite{width:128px;height:128px}
.hpbar{height:22px;background:#351919;border:3px solid #81665d;position:relative;overflow:hidden}
.hpfill{height:100%;background:#b4473d;transition:width .2s}
.hptext{position:absolute;inset:0;text-align:center;font-size:12px;line-height:16px;text-shadow:1px 1px #000}
.intent{margin:8px auto;padding:7px;border:2px solid #8d765d;background:#2a241e;max-width:420px}
.party-row{display:grid;grid-template-columns:72px 1fr;gap:8px;align-items:center;padding:6px 0;border-bottom:2px dashed #51604d}
.party-row:last-child{border-bottom:0}
.party-row canvas{width:64px;height:64px}
.role{font-weight:900}
.status{font-size:12px;color:var(--gold);min-height:14px}
.selection{font-size:12px;color:#d8cf9c}
.cards-area{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.hand-column h3{margin:0 0 5px;font-size:15px}
.hand{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.card{
  min-height:118px;background:#e7dfc3;color:#211f18;border:4px solid #665b45;
  box-shadow:3px 3px 0 #0b0e0b;padding:6px;cursor:pointer;text-align:left;
  display:flex;flex-direction:column;justify-content:space-between
}
.card.selected{border-color:#e3bd35;box-shadow:0 0 0 3px #fff1a0,3px 3px 0 #0b0e0b}
.card-name{font-weight:900;font-size:14px}
.card-desc{font-size:11px;line-height:1.3}
.card-type{font-size:10px;color:#635a44}
.controls{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap}
#executeBtn{font-size:18px;min-width:190px}
.log{height:125px;overflow:auto;white-space:pre-wrap;font-size:12px;background:#0c120e;padding:8px;border:2px solid #465442}
.overlay{position:fixed;inset:0;background:rgba(4,7,5,.93);display:none;align-items:center;justify-content:center;padding:12px;z-index:10;overflow:auto}
.overlay.show{display:flex}
.modal{width:min(980px,100%);max-height:96vh;overflow:auto}
.modal h2{text-align:center;color:var(--gold)}
.story{white-space:pre-wrap;line-height:1.8;text-align:center;font-size:16px}
.reward-grid,.candidate-grid,.gene-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.choice{cursor:pointer}
.choice:hover{border-color:var(--gold)}
.candidate{text-align:center}
.candidate canvas{width:96px;height:96px}
.inherit-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.inherit-grid .card{min-height:108px}
.inherit-count{text-align:center;color:var(--gold);font-weight:900;margin:8px}
.gene-card{text-align:center}
.gene-card canvas{width:80px;height:80px}
.notice{text-align:center;color:var(--gold)}
@media(max-width:760px){
 .battle-grid{grid-template-columns:1fr}
 .cards-area{grid-template-columns:1fr}
 .reward-grid,.candidate-grid,.gene-grid{grid-template-columns:1fr}
 .inherit-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div id="app">
  <div class="panel topbar">
    <div><div class="title">沼継ぎの一族</div><div class="sub">世代継承カードバトル 試作版 v0.2</div></div>
    <div><button class="btn" id="saveBtn">保存</button> <button class="btn danger" id="resetBtn">最初から</button></div>
  </div>
  <div id="runtimeMessage" class="panel notice" style="display:none"></div>
  <div class="panel" id="launchGuide" style="font-size:12px">
    <b>動作確認：</b> 下にカードが表示され、タップすると黄色い枠が付きます。
    ChatGPT内のファイルプレビューでは操作できない場合があります。
  </div>
  <div class="panel map" id="mapBar"></div>
  <div class="battle-grid">
    <section class="panel enemy">
      <div class="enemy-name" id="enemyName"></div>
      <div class="sprite-wrap"><canvas id="enemySprite" width="32" height="32"></canvas></div>
      <div class="hpbar"><div class="hpfill" id="enemyHpFill"></div><div class="hptext" id="enemyHpText"></div></div>
      <div class="intent" id="enemyIntent"></div>
    </section>
    <section class="panel" id="partyPanel"></section>
  </div>
  <section class="panel">
    <div class="cards-area" id="handsArea"></div>
    <div class="controls">
      <button class="btn" id="redrawBtn">仕切り直し</button>
      <button class="btn primary" id="executeBtn">3人の行動を実行</button>
    </div>
  </section>
  <section class="panel"><b>戦闘ログ</b><div class="log" id="log"></div></section>
</div>
<div class="overlay" id="overlay"><div class="panel modal" id="modal"></div></div>

<script>
"use strict";

const ROLES=["guardian","scout","mystic"];
const LABEL={guardian:"守護役",scout:"技巧役",mystic:"術式役"};

const CARDS={
 guardian:[
  {id:"heavy",name:"重斬り",type:"攻撃",desc:"敵に8ダメージ。",damage:8},
  {id:"shieldbash",name:"盾打ち",type:"攻撃",desc:"5ダメージ。次の味方の攻撃+4。",damage:5,nextBuff:4},
  {id:"intercept",name:"身代わり",type:"防御",desc:"単体攻撃を肩代わりし5軽減。",intercept:5},
  {id:"command",name:"号令",type:"補助",desc:"次の味方が攻撃なら+4、非攻撃なら4回復。",command:4},
  {id:"wall",name:"防壁",type:"防御",desc:"自身に8バリア。",selfShield:8},
  {id:"counter",name:"迎撃",type:"攻撃",desc:"4ダメージ。攻撃を受けると追加6ダメージ。",damage:4,counter:6},
  {id:"taunt",name:"挑発",type:"防御",desc:"次の単体攻撃を自身へ向ける。",taunt:true},
  {id:"advance",name:"踏み込み",type:"攻撃",desc:"10ダメージ。次の被ダメージ+2。",damage:10,vulnerable:2},
  {id:"formation",name:"守勢",type:"防御",desc:"味方全員に4バリア。",allShield:4},
  {id:"laststand",name:"決死防衛",type:"防御",desc:"HP半分以下なら12、通常時6バリア。",laststand:true}
 ],
 scout:[
  {id:"double",name:"二連突き",type:"攻撃",desc:"4ダメージを2回。",hits:[4,4]},
  {id:"pursuit",name:"追い討ち",type:"攻撃",desc:"6ダメージ。先に攻撃済みなら+5。",damage:6,pursuit:5},
  {id:"reread",name:"読み直し",type:"補助",desc:"自分の3枚を引き直す。",redraw:true},
  {id:"seal",name:"封じ針",type:"攻撃",desc:"4ダメージ。敵の追加効果を無効。",damage:4,seal:true},
  {id:"vital",name:"急所突き",type:"攻撃",desc:"11ダメージ。",damage:11},
  {id:"trip",name:"足払い",type:"攻撃",desc:"5ダメージ。次の敵攻撃-3。",damage:5,weaken:3},
  {id:"net",name:"投網",type:"攻撃",desc:"7ダメージ。次の敵攻撃-2。",damage:7,weaken:2},
  {id:"link",name:"連携",type:"補助",desc:"次の味方の攻撃+5。",nextBuff:5},
  {id:"ambush",name:"奇襲",type:"攻撃",desc:"このターン最初の攻撃なら12、通常7。",ambush:true},
  {id:"shadow",name:"影縫い",type:"攻撃",desc:"6ダメージ。敵の次行動を遅らせる。",damage:6,delay:true}
 ],
 mystic:[
  {id:"bolt",name:"魔弾",type:"攻撃",desc:"敵に9ダメージ。",damage:9},
  {id:"heal",name:"治癒の灯",type:"回復",desc:"最も傷ついた味方を9回復。",heal:9},
  {id:"ward",name:"護符",type:"防御",desc:"狙われている味方に7バリア。",targetShield:7},
  {id:"copy",name:"術式転写",type:"補助",desc:"直前の味方カードをもう一度使用。",copy:true},
  {id:"thunder",name:"雷光",type:"攻撃",desc:"敵に12ダメージ。",damage:12},
  {id:"regen",name:"再生",type:"回復",desc:"最も傷ついた味方を6回復。",heal:6},
  {id:"mist",name:"霧障壁",type:"防御",desc:"味方全員に5バリア。",allShield:5},
  {id:"vigor",name:"活力",type:"回復",desc:"最も傷ついた味方を8回復。",heal:8},
  {id:"mark",name:"呪印",type:"補助",desc:"このターン以降の攻撃+3。",mark:3},
  {id:"greatbolt",name:"大魔弾",type:"攻撃",desc:"敵に15ダメージ。",damage:15}
 ]
};

const ENEMIES={
 gecko:{name:"黒泥ヤモリ",max:46,sprite:"gecko",intents:[
  {name:"泥爪",target:"scout",damage:8,text:"技巧役へ8ダメージ"},
  {name:"壁走り",target:"mystic",damage:7,text:"術式役へ7ダメージ"},
  {name:"黒泥吐き",target:"all",damage:4,text:"全員へ4ダメージ"}]},
 snake:{name:"黒泥大蛇",max:66,sprite:"snake",intents:[
  {name:"締め付け",target:"guardian",damage:10,text:"守護役へ10ダメージ"},
  {name:"泥毒牙",target:"scout",damage:8,text:"技巧役へ8ダメージ＋追加効果"},
  {name:"尾薙ぎ",target:"all",damage:5,text:"全員へ5ダメージ"}]},
 judge1:{name:"鉄殻の審判者",max:160,sprite:"judge",intents:[
  {name:"裁断槌",target:"guardian",damage:11,text:"守護役へ11ダメージ"},
  {name:"拘束杭",target:"scout",damage:8,text:"技巧役へ8ダメージ＋追加効果"},
  {name:"薙ぎ払い",target:"all",damage:6,text:"全員へ6ダメージ"}]},
 judge2:{name:"鉄殻の審判者",max:160,sprite:"judge",intents:[
  {name:"裁断槌",target:"guardian",damage:12,text:"守護役へ12ダメージ"},
  {name:"拘束杭",target:"mystic",damage:9,text:"術式役へ9ダメージ＋追加効果"},
  {name:"露核震撃",target:"all",damage:7,text:"全員へ7ダメージ"}]},
 core:{name:"黒泥の母核",max:220,sprite:"core",intents:[
  {name:"脈動",target:"all",damage:6,text:"全員へ6ダメージ"},
  {name:"侵食槍",target:"scout",damage:12,text:"技巧役へ12ダメージ"},
  {name:"母泥の圧",target:"guardian",damage:14,text:"守護役へ14ダメージ"},
  {name:"黒潮",target:"all",damage:8,text:"全員へ8ダメージ"}]}
};

const TRAITS=[
 {id:"firstaid",name:"応急処置",desc:"戦闘開始時、HP50%以下なら5回復。"},
 {id:"focus",name:"集中",desc:"各戦闘の最初の攻撃+3。"},
 {id:"redraw",name:"仕切り直し",desc:"戦闘中1回、手札を引き直せる。"},
 {id:"unyielding",name:"不屈",desc:"戦闘中1回、HP0をHP1で耐える。"}
];
const NAMES=["アオ","リム","コル","ガマド","バスク","ミズハ","ロク","セナ","トワ"];
const PERSONALITIES=[
 "困っている者を放っておけない",
 "誰かの盾になることを誇りとしている",
 "勝負事になると目の色が変わる",
 "決めたことは最後まで曲げない",
 "古い英雄譚を集めるのが好きだ",
 "静かだが、仲間の変化にはよく気づく"
];

const STAGES=[
 {kind:"battle",enemy:"gecko",label:"黒泥ヤモリ"},
 {kind:"battle",enemy:"snake",label:"黒泥大蛇"},
 {kind:"battle",enemy:"judge1",label:"審判者・初戦"},
 {kind:"succession",label:"世代交代"},
 {kind:"battle",enemy:"judge2",label:"審判者・再戦"},
 {kind:"battle",enemy:"core",label:"黒泥の母核"},
 {kind:"end",label:"奪還"}
];

let state;

function hero(name,role,maxHp,trait,deck){
 return {name,role,maxHp,hp:maxHp,shield:0,trait,deck:[...deck],unyieldingUsed:false};
}
function initialState(){
 return {
  version:2,stage:0,generation:1,
  party:{
   guardian:hero("ガマド","guardian",50,"firstaid",["heavy","heavy","shieldbash","intercept"]),
   scout:hero("ミズハ","scout",36,"focus",["double","double","pursuit","reread"]),
   mystic:hero("セナ","mystic",32,"redraw",["bolt","bolt","heal","ward"])
  },
  enemy:null,intentIndex:0,selected:{guardian:null,scout:null,mystic:null},
  hands:{guardian:[],scout:[],mystic:[]},draw:{},discard:{},log:[],
  genealogy:[],pendingCandidate:null,pendingInheritance:[],
  flags:{nextBuff:0,command:0,mark:0,weaken:0,seal:false,delay:false,
         intercept:0,taunt:false,counter:0,vulnerable:0,redrawUsed:false,
         focusUsed:{guardian:false,scout:false,mystic:false}}
 };
}
function rand(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function card(role,id){return CARDS[role].find(x=>x.id===id)}
function trait(id){return TRAITS.find(x=>x.id===id)}
function log(s){state.log.push(s);if(state.log.length>80)state.log.shift()}
function autosave(){
 try{localStorage.setItem("numatsugi_v021",JSON.stringify(state));return true}
 catch(e){return false}
}
function save(){
 const ok=autosave();
 toast(ok?"保存しました":"この開き方では保存できません。ゲーム自体は遊べます。");
}
function load(){
 try{
  const raw=localStorage.getItem("numatsugi_v021");
  if(!raw)return false;
  let s=JSON.parse(raw);
  if(s&&s.version===2){state=s;return true}
 }catch(e){}
 return false;
}
function reset(){
 const ok = typeof confirm==="function" ? confirm("最初からやり直しますか？") : true;
 if(ok){
  try{localStorage.removeItem("numatsugi_v021")}catch(e){}
  state=initialState();startStage(0);
 }
}
function toast(msg){
 const box=document.getElementById("runtimeMessage");
 if(box){box.textContent=msg;box.style.display="block";setTimeout(()=>box.style.display="none",2500)}
}

function resetBattleFlags(){
 state.selected={guardian:null,scout:null,mystic:null};
 state.hands={guardian:[],scout:[],mystic:[]};
 state.flags={nextBuff:0,command:0,mark:0,weaken:0,seal:false,delay:false,
 intercept:0,taunt:false,counter:0,vulnerable:0,redrawUsed:false,
 focusUsed:{guardian:false,scout:false,mystic:false}};
 for(const r of ROLES){state.party[r].shield=0;state.party[r].unyieldingUsed=false}
}
function drawOne(role){
 if(!state.draw[role].length){state.draw[role]=shuffle(state.discard[role]);state.discard[role]=[]}
 return state.draw[role].pop();
}
function drawHand(role){state.hands[role]=[drawOne(role),drawOne(role),drawOne(role)]}
function drawAll(){ROLES.forEach(drawHand)}
function discardHands(){
 for(const r of ROLES){state.discard[r].push(...state.hands[r]);state.hands[r]=[]}
}
function startStage(i){
 state.stage=i;
 const s=STAGES[i];
 if(s.kind==="end"){showEnding();return}
 if(s.kind==="succession"){showSacrificeStory();return}
 const e=ENEMIES[s.enemy];
 state.enemy={key:s.enemy,name:e.name,max:e.max,hp:s.enemy==="judge2"?80:e.max,sprite:e.sprite};
 state.intentIndex=0;resetBattleFlags();
 for(const r of ROLES){
  const h=state.party[r];
  if(h.trait==="firstaid"&&h.hp<=h.maxHp/2)h.hp=Math.min(h.maxHp,h.hp+5);
  state.draw[r]=shuffle(h.deck);state.discard[r]=[];
 }
 drawAll();log(`【${e.name}】戦闘開始`);render();autosave();
}
function intent(){
 const e=ENEMIES[state.enemy.key];
 return e.intents[state.intentIndex%e.intents.length];
}
function lowest(){
 return [...ROLES].sort((a,b)=>(state.party[a].hp/state.party[a].maxHp)-(state.party[b].hp/state.party[b].maxHp))[0];
}
function damageHero(role,amount){
 const h=state.party[role];
 let dmg=Math.max(0,amount),block=Math.min(h.shield,dmg);
 h.shield-=block;dmg-=block;
 if(role==="guardian"&&state.flags.vulnerable)dmg+=state.flags.vulnerable;
 if(dmg>=h.hp&&h.trait==="unyielding"&&!h.unyieldingUsed){
  h.hp=1;h.unyieldingUsed=true;log(`${h.name}は不屈で踏みとどまった！`);return;
 }
 h.hp=Math.max(0,h.hp-dmg);log(`${h.name}に${dmg}ダメージ${block?`（${block}軽減）`:""}`);
}
function hitEnemy(v){
 let d=v+(state.flags.mark||0);state.enemy.hp=Math.max(0,state.enemy.hp-d);log(`${state.enemy.name}に${d}ダメージ`);return d;
}
function useCard(role,c,ctx){
 const h=state.party[role];let attacked=false;
 if(c.redraw){drawHand(role);log(`${h.name}は手札を読み直した`);return {attacked:false}}
 if(c.copy&&ctx.previous){log(`${h.name}が${ctx.previous.c.name}を転写`);return useCard(ctx.previous.role,ctx.previous.c,{previous:null,anyAttack:ctx.anyAttack})}
 if(c.heal){let r=lowest(),t=state.party[r],before=t.hp;t.hp=Math.min(t.maxHp,t.hp+c.heal);log(`${t.name}を${t.hp-before}回復`)}
 if(c.selfShield){h.shield+=c.selfShield;log(`${h.name}に${c.selfShield}バリア`)}
 if(c.allShield){for(const r of ROLES)state.party[r].shield+=c.allShield;log(`味方全員に${c.allShield}バリア`)}
 if(c.targetShield){let r=intent().target==="all"?"guardian":intent().target;state.party[r].shield+=c.targetShield;log(`${state.party[r].name}に${c.targetShield}バリア`)}
 if(c.laststand){let v=h.hp<=h.maxHp/2?12:6;h.shield+=v;log(`${h.name}に${v}バリア`)}
 if(c.intercept!==undefined){state.flags.intercept=c.intercept;log(`${h.name}が身代わりの構え`)}
 if(c.taunt){state.flags.taunt=true;log(`${h.name}が敵を引きつける`)}
 if(c.counter)state.flags.counter=c.counter;
 if(c.vulnerable)state.flags.vulnerable=c.vulnerable;
 if(c.nextBuff)state.flags.nextBuff+=c.nextBuff;
 if(c.command)state.flags.command=c.command;
 if(c.mark)state.flags.mark=c.mark;
 if(c.weaken)state.flags.weaken=Math.max(state.flags.weaken,c.weaken);
 if(c.seal)state.flags.seal=true;
 if(c.delay)state.flags.delay=true;

 let vals=[];
 if(c.hits)vals=[...c.hits];
 else if(c.ambush)vals=[ctx.anyAttack?7:12];
 else if(c.damage!==undefined)vals=[c.damage+(c.pursuit&&ctx.anyAttack?c.pursuit:0)];

 for(let v of vals){
  attacked=true;
  if(h.trait==="focus"&&!state.flags.focusUsed[role]){v+=3;state.flags.focusUsed[role]=true}
  if(state.flags.nextBuff){v+=state.flags.nextBuff;state.flags.nextBuff=0}
  if(state.flags.command){v+=state.flags.command;state.flags.command=0}
  hitEnemy(v);
 }
 if(!attacked&&state.flags.command){let before=h.hp;h.hp=Math.min(h.maxHp,h.hp+state.flags.command);log(`${h.name}を${h.hp-before}回復`);state.flags.command=0}
 return {attacked};
}
function executeTurn(){
 if(ROLES.some(r=>!state.selected[r])){toast("3人全員のカードを選んでください");return}
 let previous=null,anyAttack=false;
 for(const r of ROLES){
  const c=card(r,state.selected[r]);log(`${state.party[r].name}：${c.name}`);
  const out=useCard(r,c,{previous,anyAttack});if(out.attacked)anyAttack=true;previous={role:r,c};
  if(state.enemy.hp<=0)break;
 }
 if(state.enemy.key==="judge1"&&state.enemy.hp<=80){state.enemy.hp=80;render();setTimeout(()=>startStage(3),250);return}
 if(state.enemy.hp<=0){render();setTimeout(winBattle,250);return}
 enemyTurn();
 if(ROLES.some(r=>state.party[r].hp<=0)){gameOver();return}
 discardHands();drawAll();state.selected={guardian:null,scout:null,mystic:null};
 state.flags.mark=0;state.flags.intercept=0;state.flags.taunt=false;state.flags.counter=0;state.flags.vulnerable=0;
 render();autosave();
}
function enemyTurn(){
 let it=intent(),targets=it.target==="all"?[...ROLES]:[it.target],d=Math.max(0,it.damage-state.flags.weaken);
 state.flags.weaken=0;log(`${state.enemy.name}：${it.name}`);
 if(it.target!=="all"&&(state.flags.taunt||state.flags.intercept>0))targets=["guardian"];
 for(const r of targets){
  let x=d;if(r==="guardian"&&state.flags.intercept>0)x=Math.max(0,x-state.flags.intercept);
  damageHero(r,x);
  if(r==="guardian"&&state.flags.counter>0){hitEnemy(state.flags.counter);log(`${state.party.guardian.name}が迎撃した`)}
 }
 if(state.flags.delay){state.flags.delay=false}else state.intentIndex++;
 state.flags.seal=false;
}
function winBattle(){
 log(`${state.enemy.name}を撃破！`);
 if(state.stage===4){
  state.genealogy[state.genealogy.length-1].achievements.push("鉄殻の審判者討伐");
 }
 if(state.stage===5){
  state.genealogy[state.genealogy.length-1].achievements.push("黒泥の母核討伐");
  startStage(6);return;
 }
 if(state.stage===2){startStage(3);return}
 showReward();
}
function showReward(){
 const options=ROLES.map(r=>({role:r,c:rand(CARDS[r].filter(x=>!state.party[r].deck.includes(x.id)))}));
 const modal=document.getElementById("modal");
 modal.innerHTML=`<h2>戦利品</h2><p class="notice">1枚獲得するか、スキップできます。</p>
 <div class="reward-grid">${options.map((o,i)=>`<div class="panel choice" data-i="${i}">
 <div class="card"><div><div class="card-name">${LABEL[o.role]}：${o.c.name}</div><div class="card-desc">${o.c.desc}</div></div><div class="card-type">${o.c.type}</div></div></div>`).join("")}</div>
 <div class="controls"><button class="btn" id="skipReward">スキップ</button></div>`;
 showOverlay();
 modal.querySelectorAll(".choice").forEach(el=>el.onclick=()=>takeReward(options[+el.dataset.i]));
 document.getElementById("skipReward").onclick=()=>{hideOverlay();advanceAfterReward()};
}
function takeReward(o){
 const deck=state.party[o.role].deck;
 if(deck.length<10){deck.push(o.c.id);hideOverlay();advanceAfterReward()}
 else showReplace(o);
}
function showReplace(o){
 const modal=document.getElementById("modal");
 modal.innerHTML=`<h2>${LABEL[o.role]}のデッキは10枚です</h2><p class="notice">捨てるカードを選んでください。新カードを捨てることもできます。</p>
 <div class="inherit-grid">${state.party[o.role].deck.map((id,i)=>{let c=card(o.role,id);return `<div class="card choice" data-i="${i}"><div><div class="card-name">${c.name}</div><div class="card-desc">${c.desc}</div></div></div>`}).join("")}
 <div class="card choice" id="discardNew"><div><div class="card-name">新カードを捨てる</div><div class="card-desc">${o.c.name}</div></div></div></div>`;
 modal.querySelectorAll("[data-i]").forEach(el=>el.onclick=()=>{state.party[o.role].deck[+el.dataset.i]=o.c.id;hideOverlay();advanceAfterReward()});
 document.getElementById("discardNew").onclick=()=>{hideOverlay();advanceAfterReward()};
}
function advanceAfterReward(){startStage(state.stage+1)}

function showSacrificeStory(){
 const g=state.party.guardian;
 const modal=document.getElementById("modal");
 modal.innerHTML=`<h2>露核震撃</h2><div class="story">鉄殻の審判者が大きく軋んだ。

砕けた装甲の奥から黒泥が溢れ出す。

技巧役「避けきれない……！」
術式役「まずい……！」

${g.name}「下がれ」

守護役は仲間の前へ踏み出し、盾を構えた。
轟音とともに衝撃が湿地を揺らした。</div>
 <div class="controls"><button class="btn primary" id="storyNext">帰還する</button></div>`;
 showOverlay();
 document.getElementById("storyNext").onclick=showDeathStory;
}
function showDeathStory(){
 const g=state.party.guardian;
 const modal=document.getElementById("modal");
 modal.innerHTML=`<h2>${g.name}の死</h2><div class="story">遠征から数日後。

守護役の容体は回復しなかった。

一族はその死を静かに受け入れた。

後継者を選ばなければならない。</div>
 <div class="controls"><button class="btn primary" id="chooseHeir">後継者を選ぶ</button></div>`;
 document.getElementById("chooseHeir").onclick=showCandidates;
}
function makeCandidates(){
 const parent=state.party.guardian;
 let ts=[parent.trait,rand(TRAITS).id,rand(TRAITS).id];
 ts=ts.sort(()=>Math.random()-.5);
 return ts.map((t,i)=>({name:rand(NAMES),maxHp:46+Math.floor(Math.random()*9),trait:t,personality:rand(PERSONALITIES),seed:10+i+Math.random()*10}));
}
function showCandidates(){
 const candidates=makeCandidates(),modal=document.getElementById("modal");
 modal.innerHTML=`<h2>後継者候補</h2><div class="candidate-grid">${candidates.map((c,i)=>`<div class="panel candidate choice" data-i="${i}">
 <canvas width="32" height="32" id="cand${i}"></canvas><h3>${c.name}</h3><div>HP ${c.maxHp}</div>
 <div>生得：${trait(c.trait).name}</div><p>${c.personality}</p></div>`).join("")}</div>`;
 candidates.forEach((c,i)=>drawFrog(document.getElementById("cand"+i),"guardian",c.seed));
 modal.querySelectorAll(".choice").forEach(el=>el.onclick=()=>selectCandidate(candidates[+el.dataset.i]));
}
function selectCandidate(c){
 state.pendingCandidate=c;state.pendingInheritance=[];showInheritance();
}
function showInheritance(){
 const parent=state.party.guardian,modal=document.getElementById("modal");
 modal.innerHTML=`<h2>${state.pendingCandidate.name}へ継承</h2><div class="inherit-count">4枚選択：${state.pendingInheritance.length}/4</div>
 <div class="inherit-grid">${parent.deck.map((id,i)=>{let c=card("guardian",id),sel=state.pendingInheritance.includes(i)?" selected":"";return `<div class="card choice${sel}" data-i="${i}">
 <div><div class="card-name">${c.name}</div><div class="card-desc">${c.desc}</div></div><div class="card-type">${c.type}</div></div>`}).join("")}</div>
 <div class="controls"><button class="btn primary" id="confirmInheritance" ${state.pendingInheritance.length!==4?"disabled":""}>継承を確定</button></div>`;
 modal.querySelectorAll(".choice").forEach(el=>el.onclick=()=>{
  let i=+el.dataset.i,p=state.pendingInheritance.indexOf(i);
  if(p>=0)state.pendingInheritance.splice(p,1);else if(state.pendingInheritance.length<4)state.pendingInheritance.push(i);
  showInheritance();
 });
 document.getElementById("confirmInheritance").onclick=confirmInheritance;
}
function confirmInheritance(){
 const old=state.party.guardian,c=state.pendingCandidate;
 state.genealogy.push({name:old.name,generation:state.generation,trait:old.trait,age:2,achievements:["鉄殻の審判者に深手を負わせた"]});
 const inherited=state.pendingInheritance.map(i=>old.deck[i]);
 const pool=CARDS.guardian.filter(x=>!inherited.includes(x.id));
 inherited.push(rand(pool).id);
 state.party.guardian=hero(c.name,"guardian",c.maxHp,c.trait,inherited);
 state.party.scout.hp=state.party.scout.maxHp;
 state.party.mystic.hp=state.party.mystic.maxHp;
 state.generation++;hideOverlay();startStage(4);
}
function showEnding(){
 const g=state.party.guardian;
 if(!state.genealogy.some(x=>x.name===g.name)){
  state.genealogy.push({name:g.name,generation:state.generation,trait:g.trait,age:3,achievements:["鉄殻の審判者討伐","黒泥の母核討伐"]});
 }
 const modal=document.getElementById("modal");
 modal.innerHTML=`<h2>湿地奪還</h2><div class="story">黒泥は静かに崩れ落ちた。

子らは新たな湿地へ移り住む。

一族は滅びを免れた。</div>
 <h2>家系図</h2><div class="gene-grid">${state.genealogy.map((x,i)=>`<div class="panel gene-card">
 <canvas width="32" height="32" id="gene${i}"></canvas><h3>${x.name}</h3>
 <div>${x.generation}代目守護役</div><div>生得：${trait(x.trait).name}</div><div>享年${x.age}年</div>
 <p>${x.achievements.map(a=>"【"+a+"】").join("<br>")}</p></div>`).join("")}</div>
 <div class="controls"><button class="btn primary" id="again">最初から遊ぶ</button></div>`;
 showOverlay();
 state.genealogy.forEach((x,i)=>drawFrog(document.getElementById("gene"+i),"guardian",i+3));
 document.getElementById("again").onclick=()=>{hideOverlay();state=initialState();startStage(0)};
 autosave();
}
function gameOver(){
 const modal=document.getElementById("modal");
 modal.innerHTML=`<h2>遠征失敗</h2><div class="story">一族の遠征隊は黒泥の中に消えた。</div>
 <div class="controls"><button class="btn primary" id="retry">この戦闘をやり直す</button><button class="btn danger" id="restart">最初から</button></div>`;
 showOverlay();
 document.getElementById("retry").onclick=()=>{hideOverlay();for(const r of ROLES)state.party[r].hp=state.party[r].maxHp;startStage(state.stage)};
 document.getElementById("restart").onclick=()=>{hideOverlay();state=initialState();startStage(0)};
}
function redraw(){
 const g=state.party.guardian;
 if(g.trait!=="redraw"||state.flags.redrawUsed){toast("この守護役は仕切り直しを使えません");return}
 discardHands();drawAll();state.selected={guardian:null,scout:null,mystic:null};state.flags.redrawUsed=true;render();
}

function render(){
 renderMap();renderEnemy();renderParty();renderHands();
 document.getElementById("log").textContent=state.log.slice().reverse().join("\n");
 document.getElementById("redrawBtn").disabled=!(state.party.guardian.trait==="redraw"&&!state.flags.redrawUsed);
}
function renderMap(){
 document.getElementById("mapBar").innerHTML=STAGES.map((s,i)=>`<span class="node ${i<state.stage?"done":i===state.stage?"current":""}">${s.label}</span>${i<STAGES.length-1?"→":""}`).join("");
}
function renderEnemy(){
 document.getElementById("enemyName").textContent=state.enemy?state.enemy.name:"";
 if(!state.enemy)return;
 document.getElementById("enemyHpText").textContent=`${state.enemy.hp} / ${state.enemy.max}`;
 document.getElementById("enemyHpFill").style.width=(state.enemy.hp/state.enemy.max*100)+"%";
 let it=intent();document.getElementById("enemyIntent").textContent=`次の行動 ▶ ${it.name}：${it.text}`;
 drawEnemy(document.getElementById("enemySprite"),state.enemy.sprite);
}
function renderParty(){
 const p=document.getElementById("partyPanel");
 p.innerHTML=ROLES.map((r,i)=>{let h=state.party[r],sel=state.selected[r]?card(r,state.selected[r]).name:"未選択";
 return `<div class="party-row"><canvas width="32" height="32" id="hero${r}"></canvas><div>
 <div class="role">${h.name}｜${LABEL[r]}</div>
 <div>HP ${h.hp}/${h.maxHp}　バリア ${h.shield}</div>
 <div class="status">生得：${trait(h.trait).name}</div><div class="selection">選択：${sel}</div></div></div>`}).join("");
 ROLES.forEach((r,i)=>drawFrog(document.getElementById("hero"+r),r,i+state.generation*4));
}
function renderHands(){
 const area=document.getElementById("handsArea");
 area.innerHTML=ROLES.map(r=>`<div class="hand-column"><h3>${LABEL[r]}の手札</h3><div class="hand">
 ${state.hands[r].map((id,i)=>{let c=card(r,id),sel=state.selected[r]===id?" selected":"";return `<button class="card${sel}" data-role="${r}" data-i="${i}">
 <div><div class="card-name">${c.name}</div><div class="card-desc">${c.desc}</div></div><div class="card-type">${c.type}</div></button>`}).join("")}</div></div>`).join("");
 area.querySelectorAll(".card").forEach(el=>el.onclick=()=>{let r=el.dataset.role;state.selected[r]=state.hands[r][+el.dataset.i];render()});
}
function showOverlay(){document.getElementById("overlay").classList.add("show")}
function hideOverlay(){document.getElementById("overlay").classList.remove("show")}

function px(ctx,x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h)}
function drawFrog(cv,role,seed){
 const c=cv.getContext("2d");c.clearRect(0,0,32,32);
 const skin=["#7ea65d","#6f9150","#8ab56c","#5f8348"][Math.floor(seed)%4];
 px(c,9,5,14,10,skin);px(c,7,8,18,7,skin);px(c,6,16,20,10,skin);
 px(c,8,3,5,5,skin);px(c,19,3,5,5,skin);px(c,9,4,2,2,"#f5e9be");px(c,21,4,2,2,"#f5e9be");
 px(c,10,5,1,2,"#111");px(c,21,5,1,2,"#111");px(c,12,11,8,1,"#253021");
 if(role==="guardian"){px(c,4,14,5,13,"#7b684e");px(c,23,13,5,12,"#8b8f83");px(c,24,15,3,7,"#c2c5b5")}
 if(role==="scout"){px(c,7,14,18,4,"#4d5965");px(c,4,22,8,2,"#b9b9a0");px(c,20,21,8,2,"#b9b9a0")}
 if(role==="mystic"){px(c,7,15,18,11,"#594d6b");px(c,24,10,2,17,"#8c6f48");px(c,22,9,6,2,"#b8d7ff")}
}
function drawEnemy(cv,type){
 const c=cv.getContext("2d");c.clearRect(0,0,32,32);
 if(type==="gecko"){px(c,5,13,20,8,"#3a3a35");px(c,20,10,7,5,"#494940");px(c,4,18,5,7,"#242522");px(c,25,15,4,3,"#151515");px(c,23,11,2,2,"#d04444")}
 if(type==="snake"){px(c,6,20,20,5,"#30322d");px(c,20,15,7,7,"#3d4038");px(c,8,14,12,5,"#30322d");px(c,7,9,8,6,"#3d4038");px(c,10,10,2,2,"#d04444")}
 if(type==="judge"){px(c,8,6,16,20,"#4f5551");px(c,5,10,5,13,"#696e68");px(c,22,9,6,15,"#343735");px(c,12,8,8,5,"#1b1d1c");px(c,14,10,2,2,"#d04444");px(c,10,24,4,4,"#222");px(c,18,24,4,4,"#222")}
 if(type==="core"){px(c,5,8,22,18,"#171717");px(c,8,5,16,22,"#252225");px(c,12,9,8,14,"#4a1624");px(c,14,11,4,10,"#d04465");px(c,2,14,7,3,"#151515");px(c,23,16,7,3,"#151515")}
}

document.getElementById("executeBtn").onclick=executeTurn;
document.getElementById("redrawBtn").onclick=redraw;
document.getElementById("saveBtn").onclick=save;
document.getElementById("resetBtn").onclick=reset;

window.addEventListener("error",function(e){
 const box=document.getElementById("runtimeMessage");
 if(box){box.style.display="block";box.textContent="エラー：" + (e.message||"不明なエラー")}
});
try{
 if(!load())state=initialState();
 if(!state.enemy&&STAGES[state.stage].kind==="battle")startStage(state.stage);else render();
 const guide=document.getElementById("launchGuide");
 if(guide)guide.innerHTML="<b>動作中：</b> カードを3人分1枚ずつ選び、「3人の行動を実行」を押してください。";
}catch(e){
 const box=document.getElementById("runtimeMessage");
 if(box){box.style.display="block";box.textContent="起動エラー：" + e.message}
}
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(() => {});
  });
}
</script>
</body>
