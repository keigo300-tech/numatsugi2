<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0b120f">
<title>沼継ぎの一族 v0.4</title>
<style>
:root{--bg:#09100d;--panel:#122019;--line:#536b5b;--text:#efe9d2;--muted:#a8b0a5;--accent:#9b8a55}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Yu Gothic",sans-serif}body{touch-action:manipulation}button{font:inherit}
#rotate{display:none;position:fixed;inset:0;z-index:1000;background:#08100c;align-items:center;justify-content:center;text-align:center;padding:24px;font-size:20px}
#game{width:100vw;height:100vh;display:grid;grid-template-rows:52% 48%;background:radial-gradient(circle at 50% 8%,rgba(70,95,74,.22),transparent 38%),linear-gradient(#0a120e,#101a14 48%,#0b120f);overflow:hidden}
.enemy-zone{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;border-bottom:2px solid rgba(115,140,120,.35);padding:6px 12px 4px}.log-btn{position:absolute;right:12px;top:10px;width:38px;height:38px;border:1px solid var(--line);background:#14221b;color:var(--text);border-radius:8px;z-index:5}.enemy-canvas{width:min(31vw,240px);height:min(31vw,240px);max-height:60%;image-rendering:pixelated}.enemy-ui{width:min(56vw,560px);display:grid;gap:6px}.hpbar{height:17px;background:#27151f;border:2px solid #5f4956;position:relative;overflow:hidden}.hpfill{height:100%;background:linear-gradient(90deg,#5f294a,#9b4773);transition:width .45s ease}.hptext{position:absolute;inset:0;text-align:center;font-size:11px;line-height:13px;text-shadow:1px 1px #000}.next{text-align:center;font-weight:700;font-size:clamp(13px,2.2vw,19px);color:#d9d0b0}
.party-zone{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 10px 10px;align-items:stretch;min-height:0}.hero{position:relative;border:2px solid #3e5446;background:linear-gradient(#17261e,#101a15);border-radius:12px;padding:7px 6px 6px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;min-width:0;box-shadow:0 5px 14px rgba(0,0,0,.24);transition:.18s transform,.18s border-color,.18s box-shadow}.hero.unselected{animation:pulse 1.5s infinite}.hero.selected{border-color:#8d8054;box-shadow:0 0 0 1px rgba(155,138,85,.32),0 5px 14px rgba(0,0,0,.28)}.hero.locked{pointer-events:none}.hero-name{font-weight:800;font-size:clamp(13px,2.4vw,19px);white-space:nowrap}.hero-canvas{width:min(19vw,130px);height:min(19vw,130px);max-height:52%;image-rendering:pixelated}.hero-hp{width:92%}.hero-hp .hpbar{height:14px;background:#172015;border-color:#405344}.hero-hp .hpfill{background:linear-gradient(90deg,#4f7648,#82a66b)}.selected-card{min-height:28px;width:94%;border-top:1px solid rgba(130,150,135,.28);padding-top:5px;text-align:center;font-size:clamp(11px,1.9vw,15px);color:#ddd5b7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}@keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(133,157,135,0)}50%{box-shadow:0 0 15px rgba(133,157,135,.28)}}
#modalWrap,#logWrap{display:none;position:fixed;inset:0;z-index:50;background:rgba(3,6,4,.78);align-items:center;justify-content:center;padding:12px}#modalWrap.show,#logWrap.show{display:flex}.modal{width:min(92vw,860px);max-height:92vh;background:linear-gradient(#17271f,#101a15);border:2px solid #5b7061;border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,.45);padding:14px;overflow:auto}.modal-title{text-align:center;font-weight:900;font-size:clamp(18px,3vw,27px);margin-bottom:10px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.card{min-height:130px;border:2px solid #6e695a;border-radius:10px;background:linear-gradient(#e8e0c4,#cec2a2);color:#252117;padding:10px;text-align:left;box-shadow:0 5px 0 #15130e}.card:active{transform:translateY(3px)}.card-name{font-weight:900;font-size:clamp(14px,2.2vw,19px);margin-bottom:8px}.card-desc{font-size:clamp(11px,1.6vw,14px);line-height:1.4}.trait-box{margin-top:12px;padding:10px;border-top:1px solid #516457;color:#d9d2b8;background:rgba(6,10,8,.22);font-size:clamp(11px,1.7vw,14px)}.close-row{text-align:center;margin-top:10px}.close-btn{background:#26372d;color:var(--text);border:1px solid #64776a;border-radius:8px;padding:8px 18px}.log-list{white-space:pre-wrap;line-height:1.6;font-size:14px;max-height:70vh;overflow:auto;background:#0b120e;padding:10px;border-radius:8px}
.float{position:fixed;z-index:80;pointer-events:none;font-weight:900;font-size:28px;text-shadow:0 2px 3px #000;animation:floatUp .9s ease-out forwards}@keyframes floatUp{0%{opacity:0;transform:translate(-50%,10px) scale(.8)}20%{opacity:1}100%{opacity:0;transform:translate(-50%,-45px) scale(1.08)}}.flash{animation:flash .3s linear 2}@keyframes flash{50%{filter:brightness(2.2)}}.shake{animation:shake .28s ease}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}.lunge{animation:lunge .42s ease}@keyframes lunge{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px) scale(1.04)}}.slash,.magic,.spear{position:fixed;z-index:75;pointer-events:none}.slash{width:90px;height:6px;background:linear-gradient(90deg,transparent,#eee,transparent);transform:rotate(-22deg);animation:slash .35s ease-out forwards}@keyframes slash{0%{opacity:0;transform:scaleX(.1) rotate(-22deg)}35%{opacity:1}100%{opacity:0;transform:scaleX(1.35) rotate(-22deg)}}.magic{width:26px;height:26px;border-radius:50%;background:radial-gradient(circle,#eee 0 12%,#8c6bc4 28%,rgba(86,54,130,.15) 68%,transparent 70%);box-shadow:0 0 18px #8c6bc4;animation:magic .55s ease-out forwards}@keyframes magic{0%{opacity:0;transform:scale(.3)}40%{opacity:1}100%{opacity:0;transform:scale(2.5)}}.spear{width:70px;height:4px;background:linear-gradient(90deg,transparent,#cbe9ff);animation:spear .26s ease-out forwards}@keyframes spear{0%{opacity:0;transform:translateX(-20px)}40%{opacity:1}100%{opacity:0;transform:translateX(30px)}}.turn-banner{position:fixed;left:50%;top:46%;transform:translate(-50%,-50%);z-index:90;padding:8px 18px;background:rgba(10,16,12,.84);border:1px solid #5b7061;border-radius:8px;font-weight:800;opacity:0;animation:banner .7s ease}@keyframes banner{0%{opacity:0;transform:translate(-50%,-40%)}20%,75%{opacity:1}100%{opacity:0;transform:translate(-50%,-60%)}}
@media (orientation:portrait){#rotate{display:flex}#game{display:none}}@media (max-height:430px){#game{grid-template-rows:49% 51%}.enemy-canvas{max-height:56%}.hero-canvas{max-height:48%}.card{min-height:110px;padding:8px}}
</style>
</head>
<body>
<div id="rotate">端末を横向きにしてください</div>
<div style="position:fixed;left:8px;top:7px;z-index:20;font-size:12px;color:#d8cfaa;background:#14221b;border:1px solid #536b5b;border-radius:999px;padding:3px 8px">v0.4</div><div id="game"><section class="enemy-zone"><button class="log-btn" id="logBtn">☰</button><canvas id="enemyCanvas" class="enemy-canvas" width="64" height="64"></canvas><div class="enemy-ui"><div class="hpbar"><div class="hpfill" id="enemyHpFill"></div><div class="hptext" id="enemyHpText"></div></div><div class="next" id="enemyNext"></div></div></section><section class="party-zone" id="party"></section></div>
<div id="modalWrap"><div class="modal" id="modal"></div></div><div id="logWrap"><div class="modal"><div class="modal-title">戦闘記録</div><div class="log-list" id="logList"></div><div class="close-row"><button class="close-btn" id="closeLog">閉じる</button></div></div></div>
<script>
"use strict";
const CARD_DB={guardian:[{id:"heavy",name:"重斬り",desc:"敵に8ダメージ。",damage:8,fx:"slash"},{id:"shieldbash",name:"盾打ち",desc:"敵に5ダメージ。",damage:5,fx:"slash"},{id:"intercept",name:"身代わり",desc:"次の単体攻撃を肩代わりし、5軽減。",guard:5,fx:"guard"}],scout:[{id:"double",name:"二連突き",desc:"4ダメージを2回。",hits:[4,4],fx:"spear"},{id:"pursuit",name:"追い討ち",desc:"敵に9ダメージ。",damage:9,fx:"spear"},{id:"seal",name:"封じ針",desc:"敵に6ダメージ。",damage:6,fx:"spear"}],mystic:[{id:"bolt",name:"魔弾",desc:"敵に9ダメージ。",damage:9,fx:"magic"},{id:"heal",name:"治癒の灯",desc:"最も傷ついた味方を9回復。",heal:9,fx:"magic"},{id:"ward",name:"護符",desc:"狙われている味方に7バリア。",targetShield:7,fx:"magic"}]};
const TRAITS={unyielding:{name:"不屈",desc:"戦闘中1回、HP0をHP1で耐える。"},focus:{name:"集中",desc:"戦闘中、最初の攻撃に+3ダメージ。"},redraw:{name:"仕切り直し",desc:"戦闘中1回、手札を引き直せる。"}};
let uid=1;const makeCard=id=>({uid:uid++,id});
const state={enemy:{hp:160,maxHp:160,intents:["裁断槌","拘束杭","露核震撃"],intentIndex:0},locked:false,log:["鉄殻の審判者との戦闘が始まった。"],selected:{guardian:null,scout:null,mystic:null},hands:{guardian:[makeCard("heavy"),makeCard("heavy"),makeCard("intercept")],scout:[makeCard("double"),makeCard("pursuit"),makeCard("seal")],mystic:[makeCard("bolt"),makeCard("heal"),makeCard("ward")]},heroes:{guardian:{name:"ガマド",hp:50,maxHp:50,shield:0,trait:"unyielding",role:"guardian"},scout:{name:"ミズハ",hp:36,maxHp:36,shield:0,trait:"focus",role:"scout"},mystic:{name:"セナ",hp:32,maxHp:32,shield:0,trait:"redraw",role:"mystic"}},focusUsed:false,intercept:0};
const roles=["guardian","scout","mystic"];const db=(r,id)=>CARD_DB[r].find(x=>x.id===id);const sleep=ms=>new Promise(r=>setTimeout(r,ms));function log(s){state.log.push(s);renderLog()}
function render(){renderEnemy();renderParty();renderLog()}function renderEnemy(){enemyHpFill.style.width=(state.enemy.hp/state.enemy.max*100)+"%";enemyHpText.textContent=`${state.enemy.hp} / ${state.enemy.max}`;enemyNext.textContent="Next "+state.enemy.intents[state.enemy.intentIndex%state.enemy.intents.length];drawEnemy(enemyCanvas)}
function renderParty(){party.innerHTML=roles.map(r=>{const h=state.heroes[r],sel=state.selected[r];return `<button class="hero ${sel?"selected":"unselected"} ${state.locked?"locked":""}" data-role="${r}"><div class="hero-name">${h.name}</div><canvas class="hero-canvas" id="hero-${r}" width="48" height="48"></canvas><div class="hero-hp"><div class="hpbar"><div class="hpfill" style="width:${h.hp/h.maxHp*100}%"></div><div class="hptext">${h.hp}/${h.maxHp}${h.shield?` +${h.shield}`:""}</div></div></div><div class="selected-card">${sel?db(r,sel.id).name:"未選択"}</div></button>`}).join("");party.querySelectorAll(".hero").forEach(el=>el.onclick=()=>openCards(el.dataset.role));roles.forEach((r,i)=>drawHero(document.getElementById("hero-"+r),r,i))}
function renderLog(){logList.textContent=state.log.slice().reverse().join("\n")}
function openCards(role){if(state.locked)return;const h=state.heroes[role];modal.innerHTML=`<div class="modal-title">${h.name}</div><div class="cards">${state.hands[role].map(c=>{const x=db(role,c.id);return `<button class="card" data-uid="${c.uid}"><div class="card-name">${x.name}</div><div class="card-desc">${x.desc}</div></button>`}).join("")}</div><div class="trait-box"><b>生得：${TRAITS[h.trait].name}</b><br>${TRAITS[h.trait].desc}</div><div class="close-row"><button class="close-btn" id="cancelCard">閉じる</button></div>`;modalWrap.classList.add("show");modal.querySelectorAll(".card").forEach(el=>el.onclick=()=>selectCard(role,+el.dataset.uid));cancelCard.onclick=closeModal}
function closeModal(){modalWrap.classList.remove("show")}function selectCard(role,cardUid){state.selected[role]=state.hands[role].find(c=>c.uid===cardUid);closeModal();render();if(roles.every(r=>state.selected[r]))setTimeout(resolveTurn,300)}
async function resolveTurn(){if(state.locked)return;state.locked=true;render();for(const role of roles){const c=db(role,state.selected[role].id);await showBanner(`${state.heroes[role].name}　${c.name}`);await act(role,c);if(state.enemy.hp<=0)break}if(state.enemy.hp>0)await enemyAction();state.selected={guardian:null,scout:null,mystic:null};state.locked=false;render()}
async function act(role,c){const heroEl=document.querySelector(`.hero[data-role="${role}"]`);heroEl.classList.add("lunge");await sleep(220);heroEl.classList.remove("lunge");if(c.damage){effect(c.fx);await sleep(120);damageEnemy(c.damage,role)}else if(c.hits){for(const n of c.hits){effect(c.fx);await sleep(100);damageEnemy(n,role);await sleep(130)}}else if(c.heal){const t=roles.slice().sort((a,b)=>(state.heroes[a].hp/state.heroes[a].maxHp)-(state.heroes[b].hp/state.heroes[b].maxHp))[0],h=state.heroes[t],before=h.hp;h.hp=Math.min(h.maxHp,h.hp+c.heal);floatText(document.querySelector(`.hero[data-role="${t}"]`),`+${h.hp-before}`,"#b9ef9d");log(`${state.heroes[role].name}：${c.name}　${h.name}を${h.hp-before}回復`);render()}else if(c.targetShield){state.heroes.guardian.shield+=c.targetShield;floatText(document.querySelector('.hero[data-role="guardian"]'),`盾+${c.targetShield}`,"#cde7ff");log(`${state.heroes[role].name}：${c.name}　ガマドにバリア`);render()}else if(c.guard!==undefined){state.intercept=c.guard;floatText(heroEl,"身代わり","#d6d2b6");log(`${state.heroes[role].name}：${c.name}`)}await sleep(300)}
function damageEnemy(n,role){if(role==="scout"&&!state.focusUsed){n+=3;state.focusUsed=true}state.enemy.hp=Math.max(0,state.enemy.hp-n);enemyCanvas.classList.add("shake","flash");setTimeout(()=>enemyCanvas.classList.remove("shake","flash"),350);floatText(enemyCanvas,`-${n}`,"#ffd7d7");log(`${state.heroes[role].name}：${db(role,state.selected[role].id).name}　${n}ダメージ`);renderEnemy()}
async function enemyAction(){const name=state.enemy.intents[state.enemy.intentIndex%state.enemy.intents.length];await showBanner(`敵　${name}`);enemyCanvas.classList.add("lunge");await sleep(250);enemyCanvas.classList.remove("lunge");const targets=name==="露核震撃"?roles:["guardian"];for(const r of targets){let dmg=name==="露核震撃"?7:11;if(r==="guardian"&&state.intercept)dmg=Math.max(0,dmg-state.intercept);const h=state.heroes[r];const blocked=Math.min(h.shield,dmg);h.shield-=blocked;dmg-=blocked;if(dmg>=h.hp&&h.trait==="unyielding")h.hp=1;else h.hp=Math.max(0,h.hp-dmg);const el=document.querySelector(`.hero[data-role="${r}"]`);el.classList.add("shake","flash");setTimeout(()=>el.classList.remove("shake","flash"),350);floatText(el,`-${dmg}`,"#ffb1b1");log(`敵：${name}　${h.name}に${dmg}ダメージ`)}state.intercept=0;state.enemy.intentIndex++;render();await sleep(500)}
function effect(type){const r=enemyCanvas.getBoundingClientRect(),el=document.createElement("div");el.className=type==="magic"?"magic":type==="spear"?"spear":"slash";el.style.left=(r.left+r.width/2-35)+"px";el.style.top=(r.top+r.height/2)+"px";document.body.appendChild(el);setTimeout(()=>el.remove(),700)}function floatText(target,text,color){const r=target.getBoundingClientRect(),el=document.createElement("div");el.className="float";el.textContent=text;el.style.left=(r.left+r.width/2)+"px";el.style.top=(r.top+r.height/2)+"px";el.style.color=color;document.body.appendChild(el);setTimeout(()=>el.remove(),950)}function showBanner(text){return new Promise(resolve=>{const el=document.createElement("div");el.className="turn-banner";el.textContent=text;document.body.appendChild(el);setTimeout(()=>{el.remove();resolve()},700)})}
function px(c,x,y,w,h,col){c.fillStyle=col;c.fillRect(x,y,w,h)}function drawHero(cv,role,seed){const c=cv.getContext("2d");c.clearRect(0,0,48,48);const skin=["#72965a","#7fa165","#66884e"][seed%3];px(c,14,8,20,14,skin);px(c,11,13,26,11,skin);px(c,13,6,7,7,skin);px(c,28,6,7,7,skin);px(c,15,8,2,3,"#111");px(c,31,8,2,3,"#111");px(c,18,18,12,2,"#263021");px(c,12,24,24,17,skin);if(role==="guardian"){px(c,5,23,10,20,"#6a5c48");px(c,34,21,9,20,"#7a7f78");px(c,36,24,5,12,"#b6b9ae")}if(role==="scout"){px(c,11,25,26,7,"#43515e");px(c,3,33,15,3,"#b9c6ce");px(c,30,31,15,3,"#b9c6ce")}if(role==="mystic"){px(c,11,25,26,17,"#554966");px(c,39,14,3,29,"#806843");px(c,35,13,10,3,"#8e79bd")}}
function drawEnemy(cv){const c=cv.getContext("2d");c.clearRect(0,0,64,64);px(c,18,8,28,42,"#4f5551");px(c,10,18,13,27,"#696e68");px(c,43,15,11,31,"#343735");px(c,24,14,16,10,"#1b1d1c");px(c,28,17,3,3,"#d04444");px(c,22,48,8,8,"#222");px(c,36,48,8,8,"#222");px(c,7,30,12,5,"#7f343e");px(c,46,27,12,6,"#4b1e2e")}
logBtn.onclick=()=>logWrap.classList.add("show");closeLog.onclick=()=>logWrap.classList.remove("show");logWrap.onclick=e=>{if(e.target===logWrap)logWrap.classList.remove("show")};modalWrap.onclick=e=>{if(e.target===modalWrap)closeModal()};render();
</script>
</body>
</html>
